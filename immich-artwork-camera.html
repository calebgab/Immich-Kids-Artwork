<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Artwork Camera">
    <meta name="theme-color" content="#0f172a">
    <link rel="manifest" href="/manifest.json">
    <link rel="apple-touch-icon" href="/icon.svg">
    <title>Artwork Camera</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-user-select: none;
            user-select: none;
        }

        :root {
            --primary: #2563eb;
            --primary-dark: #1d4ed8;
            --success: #10b981;
            --danger: #ef4444;
            --bg-dark: #0f172a;
            --bg-card: #1e293b;
            --border: #334155;
            --text-primary: #f1f5f9;
            --text-secondary: #cbd5e1;
            --shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.5);
        }

        html, body {
            width: 100%;
            height: 100%;
            background: var(--bg-dark);
            color: var(--text-primary);
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            overflow: hidden;
        }

        body.safe-area-inset {
            padding-top: max(16px, env(safe-area-inset-top));
            padding-bottom: max(16px, env(safe-area-inset-bottom));
        }

        .app-container {
            display: flex;
            flex-direction: column;
            width: 100%;
            height: 100vh;
            height: 100dvh;
            padding: 0;
        }

        /* Screen: Settings */
        #settingsScreen {
            display: flex;
            flex-direction: column;
            padding: 20px;
            gap: 20px;
            overflow-y: auto;
            flex: 1;
        }

        .screen-title {
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 10px;
            letter-spacing: -0.5px;
        }

        .input-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .input-group label {
            font-size: 14px;
            font-weight: 600;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        input[type="text"],
        input[type="password"] {
            padding: 12px 16px;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text-primary);
            font-size: 16px;
            font-family: inherit;
        }

        input[type="text"]:focus,
        input[type="password"]:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1);
        }

        .button {
            padding: 12px 20px;
            border: none;
            border-radius: 8px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            width: 100%;
        }

        .button-primary {
            background: var(--primary);
            color: white;
        }

        .button-primary:active {
            background: var(--primary-dark);
            transform: scale(0.98);
        }

        .button-primary:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .button-secondary {
            background: var(--bg-card);
            color: var(--text-primary);
            border: 1px solid var(--border);
        }

        .button-secondary:active {
            background: #2d3748;
        }

        .button-danger {
            background: var(--danger);
            color: white;
        }

        .button-danger:active {
            background: #dc2626;
            transform: scale(0.98);
        }

        .info-box {
            padding: 12px 16px;
            background: rgba(37, 99, 235, 0.1);
            border: 1px solid var(--primary);
            border-radius: 8px;
            font-size: 13px;
            color: #60a5fa;
            line-height: 1.5;
        }

        /* Screen: Album Selection */
        #albumScreen {
            display: flex;
            flex-direction: column;
            padding: 20px;
            gap: 16px;
            overflow-y: auto;
            flex: 1;
        }

        .album-list {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .album-item {
            padding: 16px;
            background: var(--bg-card);
            border: 2px solid transparent;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .album-item:active {
            background: rgba(37, 99, 235, 0.2);
            border-color: var(--primary);
        }

        .album-name {
            font-weight: 500;
            font-size: 16px;
        }

        .album-badge {
            font-size: 12px;
            color: var(--text-secondary);
            background: rgba(0, 0, 0, 0.3);
            padding: 4px 8px;
            border-radius: 4px;
        }

        .section-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 8px 4px;
            cursor: pointer;
        }

        .section-title {
            font-size: 12px;
            font-weight: 700;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.8px;
        }

        .section-chevron {
            font-size: 11px;
            color: var(--text-secondary);
            transition: transform 0.2s;
        }

        .section-chevron.collapsed {
            transform: rotate(-90deg);
        }

        .section-items {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .section-items.collapsed {
            display: none;
        }

        .favorite-btn {
            background: none;
            border: none;
            font-size: 18px;
            cursor: pointer;
            padding: 4px 6px;
            line-height: 1;
            opacity: 0.6;
        }

        .favorite-btn.active {
            opacity: 1;
        }

        .loading-spinner {
            width: 20px;
            height: 20px;
            border: 2px solid rgba(255, 255, 255, 0.2);
            border-top-color: var(--primary);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Screen: Camera */
        #cameraScreen {
            display: flex;
            flex-direction: column;
            padding: 0;
            gap: 0;
            flex: 1;
            position: relative;
        }

        .camera-header {
            padding: 16px 20px;
            padding-top: max(16px, env(safe-area-inset-top));
            background: rgba(15, 23, 42, 0.8);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 10;
        }

        .album-display {
            font-size: 14px;
            color: var(--text-secondary);
        }

        .album-display .name {
            color: var(--text-primary);
            font-weight: 600;
        }

        .camera-feed-container {
            flex: 1;
            position: relative;
            background: #000;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        canvas#captureCanvas {
            display: none;
        }

        .camera-controls {
            padding: 20px;
            background: rgba(15, 23, 42, 0.8);
            backdrop-filter: blur(10px);
            border-top: 1px solid var(--border);
            display: flex;
            gap: 12px;
            z-index: 10;
        }

        .capture-button {
            flex: 1;
            height: 56px;
            background: var(--primary);
            border: none;
            border-radius: 12px;
            color: white;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .capture-button:active {
            background: var(--primary-dark);
            transform: scale(0.96);
        }

        .capture-button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .flip-button {
            width: 56px;
            height: 56px;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 12px;
            color: var(--text-primary);
            font-size: 20px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s ease;
        }

        .flip-button:active {
            background: #2d3748;
        }

        .scan-button {
            width: 56px;
            height: 56px;
            flex: none;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 12px;
            color: var(--text-primary);
            font-size: 20px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s ease;
        }

        .scan-button.active {
            background: var(--primary);
            border-color: var(--primary);
        }

        #scanOverlay {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            display: none;
            touch-action: none;
        }

        /* Screen: Preview */
        #previewScreen {
            display: flex;
            flex-direction: column;
            padding: 0;
            gap: 0;
            flex: 1;
        }

        .preview-image-container {
            flex: 1;
            background: #000;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .preview-image-container img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        .preview-controls {
            padding: 20px;
            background: rgba(15, 23, 42, 0.8);
            backdrop-filter: blur(10px);
            border-top: 1px solid var(--border);
            display: flex;
            gap: 12px;
        }

        .preview-controls button {
            flex: 1;
            padding: 12px 20px;
            border: none;
            border-radius: 8px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .btn-retake {
            background: var(--bg-card);
            color: var(--text-primary);
            border: 1px solid var(--border);
        }

        .btn-retake:active {
            background: #2d3748;
        }

        .btn-upload {
            background: var(--success);
            color: white;
        }

        .btn-upload:active {
            background: #059669;
            transform: scale(0.98);
        }

        .btn-upload:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        /* Screen: Upload */
        #uploadScreen {
            display: flex;
            flex-direction: column;
            padding: 20px;
            gap: 20px;
            overflow-y: auto;
            flex: 1;
            align-items: center;
            justify-content: center;
        }

        .upload-progress {
            display: flex;
            flex-direction: column;
            gap: 16px;
            width: 100%;
            max-width: 300px;
        }

        .progress-item {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .progress-item-name {
            font-size: 14px;
            font-weight: 500;
            color: var(--text-secondary);
        }

        .progress-bar {
            width: 100%;
            height: 6px;
            background: var(--bg-card);
            border-radius: 3px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--primary), var(--success));
            width: 0%;
            transition: width 0.3s ease;
        }

        .status-icon {
            font-size: 48px;
            margin-bottom: 16px;
        }

        .status-text {
            font-size: 16px;
            font-weight: 600;
            text-align: center;
            margin-bottom: 8px;
        }

        .status-subtext {
            font-size: 14px;
            color: var(--text-secondary);
            text-align: center;
        }

        /* Error State */
        .error-message {
            padding: 12px 16px;
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid var(--danger);
            border-radius: 8px;
            color: #fca5a5;
            font-size: 14px;
            margin-bottom: 16px;
        }

        /* Visibility */
        .screen {
            display: none !important;
        }

        .screen.active {
            display: flex !important;
        }

        /* Utility */
        .text-center {
            text-align: center;
        }

        .text-muted {
            color: var(--text-secondary);
        }

        .mt-auto {
            margin-top: auto;
        }

        /* iOS Safe Area */
        @supports (padding: max(0px)) {
            #settingsScreen,
            #albumScreen,
            #uploadScreen {
                padding-top: max(20px, env(safe-area-inset-top));
                padding-bottom: max(20px, env(safe-area-inset-bottom));
            }

            .camera-controls,
            .preview-controls {
                padding-bottom: max(20px, env(safe-area-inset-bottom));
            }
        }
    </style>
</head>
<body>
    <div class="app-container">
        <!-- Settings Screen -->
        <div id="settingsScreen" class="screen active">
            <h1 class="screen-title">⚙️ Settings</h1>
            
            <div class="input-group">
                <label for="immichUrl">Immich URL</label>
                <input 
                    type="text" 
                    id="immichUrl" 
                    placeholder="https://immich.demo.com"
                >
            </div>

            <div class="input-group">
                <label for="apiKey">API Key</label>
                <input 
                    type="password" 
                    id="apiKey" 
                    placeholder="Your Immich API key"
                >
            </div>

            <div class="info-box">
                <strong>Create your API key in Immich:</strong><br>
                Account Settings → API Keys → New API Key<br><br>
                <strong>Required permissions:</strong><br>
                • album.read<br>
                • asset.upload<br>
                • albumAsset.create
            </div>

            <button class="button button-primary" id="testConnectionBtn">
                Test Connection
            </button>

            <div id="connectionStatus"></div>

            <div class="mt-auto" style="display: flex; flex-direction: column; gap: 12px;">
                <button class="button button-primary" id="startBtn" disabled>
                    Start Capturing
                </button>
                <button class="button button-secondary" id="cancelSettingsBtn" style="display: none;">
                    Cancel
                </button>
                <div style="text-align: center; font-size: 12px; color: var(--text-secondary); opacity: 0.5;">v2026.04.27.10</div>
            </div>
        </div>

        <!-- Album Selection Screen -->
        <div id="albumScreen" class="screen">
            <div style="display: flex; align-items: center; justify-content: space-between;">
                <h1 class="screen-title" style="margin-bottom: 0;">📁 Select Album</h1>
                <button id="settingsCogBtn" style="background: none; border: none; font-size: 24px; cursor: pointer; padding: 4px 8px; color: var(--text-secondary);">⚙️</button>
            </div>

            <div id="albumLoading" style="display: flex; align-items: center; justify-content: center; gap: 12px; padding: 40px 20px;">
                <div class="loading-spinner"></div>
                <span>Loading albums...</span>
            </div>

            <div id="albumList" class="album-list" style="display: none;"></div>

            <div id="albumError" class="error-message" style="display: none;"></div>
        </div>

        <!-- Camera Screen -->
        <div id="cameraScreen" class="screen">
            <div class="camera-header">
                <span class="album-display">
                    Album: <span class="name" id="selectedAlbumName">—</span>
                </span>
                <button class="button-secondary" id="backFromCameraBtn" style="width: 40px; height: 40px; padding: 0; display: flex; align-items: center; justify-content: center;">
                    ✕
                </button>
            </div>

            <div class="camera-feed-container">
                <video id="videoElement" playsinline></video>
                <canvas id="captureCanvas"></canvas>
            </div>

            <div class="camera-controls">
                <button class="flip-button" id="flipCameraBtn">🔄</button>
                <button class="capture-button" id="captureBtn">Capture</button>
            </div>
        </div>

        <!-- Preview Screen -->
        <div id="previewScreen" class="screen">
            <div class="preview-image-container" style="position:relative;">
                <img id="previewImage" src="" alt="Preview">
                <canvas id="scanOverlay"></canvas>
            </div>

            <div class="preview-controls">
                <button class="btn-retake" id="retakeBtn">Retake</button>
                <button class="scan-button" id="scanModeBtn" title="Apply document scan">📄</button>
                <button class="btn-upload" id="uploadBtn">Upload</button>
            </div>
        </div>

        <!-- Upload Screen -->
        <div id="uploadScreen" class="screen">
            <div id="uploadContent">
                <div class="status-icon">⏳</div>
                <div class="status-text">Uploading Photos</div>
                <div class="status-subtext" id="uploadSubtext">Preparing upload...</div>
                <div class="upload-progress" id="uploadProgress"></div>
            </div>
        </div>
    </div>

    <script>
        // State management
        const state = {
            immichUrl: localStorage.getItem('immichUrl') || '',
            apiKey: localStorage.getItem('apiKey') || '',
            selectedAlbumId: null,
            selectedAlbumName: null,
            albums: [],
            capturedPhotos: [],
            currentFacingMode: 'environment',
            stream: null,
            currentScreen: 'settings',
            scanMode: false,
            scanCorners: null,
            capturedDataUrl: null
        };

        // Utility: Show screen
        function showScreen(screenId) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(screenId).classList.add('active');
            state.currentScreen = screenId;
        }

        // Settings Screen
        document.getElementById('immichUrl').value = state.immichUrl;
        document.getElementById('apiKey').value = state.apiKey;

        document.getElementById('testConnectionBtn').addEventListener('click', async () => {
            const url = document.getElementById('immichUrl').value.trim();
            const key = document.getElementById('apiKey').value.trim();

            if (!url || !key) {
                showStatus('Please fill in both fields', 'error');
                return;
            }

            const btn = document.getElementById('testConnectionBtn');
            btn.disabled = true;
            btn.textContent = 'Testing...';

            try {
                const response = await fetch('/test-connection', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ url, apiKey: key })
                });

                const result = await response.json();

                if (result.error) {
                    showStatus(`✗ Connection failed: ${result.error}`, 'error');
                } else if (result.status >= 200 && result.status < 300) {
                    localStorage.setItem('immichUrl', url);
                    localStorage.setItem('apiKey', key);
                    state.immichUrl = url;
                    state.apiKey = key;
                    showStatus('✓ Connection successful!', 'success');
                    document.getElementById('startBtn').disabled = false;
                } else {
                    showStatus(`✗ HTTP ${result.status} — check URL and API key`, 'error');
                }
            } catch (e) {
                showStatus(`✗ Connection failed: ${e.message}`, 'error');
            }

            btn.disabled = false;
            btn.textContent = 'Test Connection';
        });

        function showStatus(message, type) {
            const statusEl = document.getElementById('connectionStatus');
            statusEl.innerHTML = `<div class="info-box" style="background: ${type === 'success' ? 'rgba(16, 185, 129, 0.1)' : 'rgba(239, 68, 68, 0.1)'}; border-color: ${type === 'success' ? '#10b981' : '#ef4444'}; color: ${type === 'success' ? '#6ee7b7' : '#fca5a5'}">${message}</div>`;
        }

        document.getElementById('startBtn').addEventListener('click', () => {
            loadAlbums();
        });

        // Album Selection
        async function loadAlbums() {
            showScreen('albumScreen');
            document.getElementById('albumList').style.display = 'none';
            document.getElementById('albumLoading').style.display = 'flex';
            document.getElementById('albumError').style.display = 'none';

            try {
                const response = await fetch('/fetch-albums', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ url: state.immichUrl, apiKey: state.apiKey })
                });

                const result = await response.json();
                if (result.error) throw new Error(result.error);
                if (result.status < 200 || result.status >= 300) throw new Error(`HTTP ${result.status}`);
                state.albums = JSON.parse(result.body);
                renderAlbums();
            } catch (e) {
                document.getElementById('albumError').textContent = `✗ ${e.message}`;
                document.getElementById('albumError').style.display = 'block';
                document.getElementById('albumLoading').style.display = 'none';
            }
        }

        function getFavorites() {
            return JSON.parse(localStorage.getItem('favoriteAlbums') || '[]');
        }

        function toggleFavorite(albumId) {
            const favorites = getFavorites();
            const idx = favorites.indexOf(albumId);
            if (idx === -1) favorites.push(albumId);
            else favorites.splice(idx, 1);
            localStorage.setItem('favoriteAlbums', JSON.stringify(favorites));
            renderAlbums();
        }

        function createAlbumItem(album) {
            const isFav = getFavorites().includes(album.id);
            const el = document.createElement('div');
            el.className = 'album-item';
            el.innerHTML = `
                <span class="album-name">${album.albumName}</span>
                <div style="display:flex;align-items:center;gap:6px;">
                    <span class="album-badge">${album.assetCount || 0} photos</span>
                    <button class="favorite-btn ${isFav ? 'active' : ''}" title="${isFav ? 'Remove from favourites' : 'Add to favourites'}">
                        ${isFav ? '⭐' : '☆'}
                    </button>
                </div>
            `;
            el.querySelector('.favorite-btn').addEventListener('click', e => {
                e.stopPropagation();
                toggleFavorite(album.id);
            });
            el.addEventListener('click', () => selectAlbum(album));
            return el;
        }

        function createSection(title, albums, expanded) {
            const section = document.createElement('div');
            section.style.cssText = 'display:flex;flex-direction:column;gap:8px;';

            const header = document.createElement('div');
            header.className = 'section-header';
            header.innerHTML = `<span class="section-title">${title}</span><span class="section-chevron ${expanded ? '' : 'collapsed'}">▼</span>`;

            const items = document.createElement('div');
            items.className = `section-items ${expanded ? '' : 'collapsed'}`;
            albums.forEach(a => items.appendChild(createAlbumItem(a)));

            if (albums.length === 0) {
                const empty = document.createElement('div');
                empty.style.cssText = 'padding:12px 4px;font-size:13px;color:var(--text-secondary);';
                empty.textContent = 'Tap ☆ on an album below to add it here.';
                items.appendChild(empty);
            }

            header.addEventListener('click', () => {
                const collapsed = items.classList.toggle('collapsed');
                header.querySelector('.section-chevron').classList.toggle('collapsed', collapsed);
            });

            section.appendChild(header);
            section.appendChild(items);
            return section;
        }

        function renderAlbums() {
            const container = document.getElementById('albumList');
            container.innerHTML = '';

            const favorites = getFavorites();
            const favAlbums = state.albums.filter(a => favorites.includes(a.id));
            const otherAlbums = state.albums.filter(a => !favorites.includes(a.id));

            container.appendChild(createSection('⭐ Favourites', favAlbums, true));
            container.appendChild(createSection('All Albums', otherAlbums, favAlbums.length === 0));

            document.getElementById('albumLoading').style.display = 'none';
            document.getElementById('albumList').style.display = 'flex';
        }

        function selectAlbum(album) {
            state.selectedAlbumId = album.id;
            state.selectedAlbumName = album.albumName;
            localStorage.setItem('lastAlbum', JSON.stringify({ id: album.id, name: album.albumName }));
            startCamera();
        }

        document.getElementById('settingsCogBtn').addEventListener('click', () => {
            document.getElementById('cancelSettingsBtn').style.display = 'flex';
            showScreen('settingsScreen');
        });

        document.getElementById('cancelSettingsBtn').addEventListener('click', () => {
            loadAlbums();
        });

        // Camera
        async function startCamera() {
            showScreen('cameraScreen');
            document.getElementById('selectedAlbumName').textContent = state.selectedAlbumName;

            try {
                const constraints = {
                    video: {
                        facingMode: state.currentFacingMode,
                        width: { ideal: 4096 },
                        height: { ideal: 4096 }
                    },
                    audio: false
                };
                state.stream = await navigator.mediaDevices.getUserMedia(constraints);
                const video = document.getElementById('videoElement');
                video.srcObject = state.stream;
                await video.play();
            } catch (e) {
                alert('Camera access denied');
                showScreen('albumScreen');
            }
        }

        document.getElementById('captureBtn').addEventListener('click', () => {
            const video = document.getElementById('videoElement');
            const canvas = document.getElementById('captureCanvas');
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            canvas.getContext('2d').drawImage(video, 0, 0);
            state.capturedDataUrl = canvas.toDataURL('image/jpeg');
            canvas.toBlob(blob => {
                state.capturedPhotos.push(blob);
                showPreview(state.capturedDataUrl);
            }, 'image/jpeg', 1.0);
        });

        document.getElementById('flipCameraBtn').addEventListener('click', async () => {
            state.currentFacingMode = state.currentFacingMode === 'environment' ? 'user' : 'environment';
            if (state.stream) {
                state.stream.getTracks().forEach(t => t.stop());
            }
            await startCamera();
        });

        document.getElementById('backFromCameraBtn').addEventListener('click', () => {
            if (state.stream) {
                state.stream.getTracks().forEach(t => t.stop());
            }
            state.capturedPhotos = [];
            loadAlbums();
        });

        document.getElementById('scanModeBtn').addEventListener('click', () => {
            state.scanMode = !state.scanMode;
            document.getElementById('scanModeBtn').classList.toggle('active', state.scanMode);
            const overlay = document.getElementById('scanOverlay');
            if (state.scanMode) {
                const img = document.getElementById('previewImage');
                const tmp = document.createElement('canvas');
                tmp.width = img.naturalWidth; tmp.height = img.naturalHeight;
                tmp.getContext('2d').drawImage(img, 0, 0);
                state.scanCorners = detectDocumentCorners(tmp);
                overlay.style.display = 'block';
                drawScanOverlay();
            } else {
                state.scanCorners = null;
                overlay.style.display = 'none';
            }
        });

        // Scan: corner detection via luminance + integral-image neighbourhood density.
        //
        // A pixel qualifies as "paper" only if ≥25% of its 40×40 neighbourhood is
        // bright (paper-coloured). This rejects single noise pixels and JPEG artefacts
        // while accepting pixels at and near the paper boundary. The integral image
        // makes neighbourhood queries O(1) so the whole scan is fast.
        // Only BOUNDARY pixels qualify (lo < bright_fraction < hi): this excludes solid
        // interior paper pixels and solid background, leaving only the paper edge where
        // the transition happens. Corner is the most extreme boundary pixel per direction.
        function detectDocumentCorners(srcCanvas) {
            const W = srcCanvas.width, H = srcCanvas.height;
            const maxDim = Math.max(W, H);
            const scale = maxDim > 640 ? 640 / maxDim : 1;
            const sw = Math.round(W * scale), sh = Math.round(H * scale);

            const small = document.createElement('canvas');
            small.width = sw; small.height = sh;
            small.getContext('2d').drawImage(srcCanvas, 0, 0, sw, sh);
            const px = small.getContext('2d').getImageData(0, 0, sw, sh).data;

            // Gaussian-blurred luminance to smooth JPEG artefacts
            const luma = new Float32Array(sw * sh);
            for (let i = 0; i < sw * sh; i++) {
                luma[i] = 0.299 * px[i*4] + 0.587 * px[i*4+1] + 0.114 * px[i*4+2];
            }
            const blurred = new Float32Array(sw * sh);
            for (let y = 1; y < sh - 1; y++) {
                for (let x = 1; x < sw - 1; x++) {
                    blurred[y*sw+x] = (
                        luma[(y-1)*sw+(x-1)] + 2*luma[(y-1)*sw+x] + luma[(y-1)*sw+(x+1)] +
                        2*luma[y*sw+(x-1)]   + 4*luma[y*sw+x]     + 2*luma[y*sw+(x+1)] +
                        luma[(y+1)*sw+(x-1)] + 2*luma[(y+1)*sw+x] + luma[(y+1)*sw+(x+1)]
                    ) / 16;
                }
            }

            // Threshold separating paper (bright) from background
            let lumaMin = 255, lumaMax = 0;
            for (let i = 0; i < sw * sh; i++) {
                if (blurred[i] < lumaMin) lumaMin = blurred[i];
                if (blurred[i] > lumaMax) lumaMax = blurred[i];
            }
            const thresh = lumaMin + (lumaMax - lumaMin) * 0.55;

            // Integral image of binary bright map — enables O(1) rectangle sum queries
            const integ = new Int32Array((sw + 1) * (sh + 1));
            for (let y = 0; y < sh; y++) {
                for (let x = 0; x < sw; x++) {
                    integ[(y+1)*(sw+1)+(x+1)] = (blurred[y*sw+x] > thresh ? 1 : 0)
                        + integ[y*(sw+1)+(x+1)]
                        + integ[(y+1)*(sw+1)+x]
                        - integ[y*(sw+1)+x];
                }
            }
            const boxSum = (x1, y1, x2, y2) => {
                x1 = Math.max(0, x1); y1 = Math.max(0, y1);
                x2 = Math.min(sw-1, x2); y2 = Math.min(sh-1, y2);
                if (x1 > x2 || y1 > y2) return 0;
                return integ[(y2+1)*(sw+1)+(x2+1)]
                     - integ[y1*(sw+1)+(x2+1)]
                     - integ[(y2+1)*(sw+1)+x1]
                     + integ[y1*(sw+1)+x1];
            };

            // Paper centroid (center of bright region) used to restrict each corner's
            // search to its correct quadrant, preventing far-side false positives.
            let totB = 0, sx = 0, sy = 0;
            for (let y = 0; y < sh; y++) {
                for (let x = 0; x < sw; x++) {
                    if (blurred[y*sw+x] > thresh) { totB++; sx += x; sy += y; }
                }
            }
            const cx = totB > 0 ? sx / totB : sw / 2;
            const cy = totB > 0 ? sy / totB : sh / 2;
            const qmx = sw * 0.35, qmy = sh * 0.35;

            // lo excludes solid background; hi excludes solid interior paper pixels.
            // Paper boundary pixels have fraction ~0.25 (corner) to ~0.50 (edge midpoint).
            const r = 20, lo = 0.10, hi = 0.80;

            let tlS = Infinity, trS = Infinity, brS = Infinity, blS = Infinity;
            let tlC = { x:sw*0.1, y:sh*0.1 }, trC = { x:sw*0.9, y:sh*0.1 };
            let brC = { x:sw*0.9, y:sh*0.9 }, blC = { x:sw*0.1, y:sh*0.9 };

            for (let y = 0; y < sh; y++) {
                for (let x = 0; x < sw; x++) {
                    const aW = Math.min(x+r, sw-1) - Math.max(x-r, 0) + 1;
                    const aH = Math.min(y+r, sh-1) - Math.max(y-r, 0) + 1;
                    const frac = boxSum(x-r, y-r, x+r, y+r) / (aW * aH);
                    if (frac < lo || frac > hi) continue;

                    const dx = x - cx, dy = y - cy;
                    if (x+y               < tlS && dx <= qmx && dy <= qmy)  { tlS = x+y;               tlC = { x, y }; }
                    if ((sw-1-x)+y        < trS && -dx <= qmx && dy <= qmy) { trS = (sw-1-x)+y;        trC = { x, y }; }
                    if ((sw-1-x)+(sh-1-y) < brS && -dx <= qmx && -dy <= qmy){ brS = (sw-1-x)+(sh-1-y);brC = { x, y }; }
                    if (x+(sh-1-y)        < blS && dx <= qmx && -dy <= qmy) { blS = x+(sh-1-y);        blC = { x, y }; }
                }
            }

            let corners = [tlC, trC, brC, blC].map(c => ({ x: c.x / scale, y: c.y / scale }));

            // Sanity check — fall back to full frame with small margin if degenerate
            const qw = Math.max(corners[1].x - corners[0].x, corners[2].x - corners[3].x);
            const qh = Math.max(corners[3].y - corners[0].y, corners[2].y - corners[1].y);
            if (qw < W * 0.2 || qh < H * 0.2) {
                const m = 0.05;
                return [
                    { x:W*m, y:H*m }, { x:W*(1-m), y:H*m },
                    { x:W*(1-m), y:H*(1-m) }, { x:W*m, y:H*(1-m) }
                ];
            }

            return corners;
        }

        // Scan: perspective warp using strip-based affine approximation (150 strips)
        function applyPerspectiveWarp(srcCanvas, corners) {
            const [tl, tr, br, bl] = corners;
            const topW  = Math.hypot(tr.x-tl.x, tr.y-tl.y);
            const botW  = Math.hypot(br.x-bl.x, br.y-bl.y);
            const leftH = Math.hypot(bl.x-tl.x, bl.y-tl.y);
            const rightH= Math.hypot(br.x-tr.x, br.y-tr.y);
            const dstW  = Math.round((topW + botW) / 2);
            const dstH  = Math.round((leftH + rightH) / 2);

            const dst = document.createElement('canvas');
            dst.width = dstW; dst.height = dstH;
            const ctx = dst.getContext('2d');

            const N = 150;
            for (let i = 0; i < N; i++) {
                const t0 = i / N, t1 = (i + 1) / N;
                const sl0 = { x: tl.x+(bl.x-tl.x)*t0, y: tl.y+(bl.y-tl.y)*t0 };
                const sl1 = { x: tl.x+(bl.x-tl.x)*t1, y: tl.y+(bl.y-tl.y)*t1 };
                const sr0 = { x: tr.x+(br.x-tr.x)*t0, y: tr.y+(br.y-tr.y)*t0 };
                const dy0 = t0 * dstH, dy1 = t1 * dstH, stripH = dy1 - dy0;

                const v1x = sr0.x-sl0.x, v1y = sr0.y-sl0.y;
                const v2x = sl1.x-sl0.x, v2y = sl1.y-sl0.y;
                const det = v1x*v2y - v1y*v2x;
                if (Math.abs(det) < 1e-10) continue;

                const a = dstW*v2y/det,  c = -dstW*v2x/det;
                const b = -stripH*v1y/det, d = stripH*v1x/det;
                const e = -a*sl0.x - c*sl0.y;
                const f = dy0 - b*sl0.x - d*sl0.y;

                ctx.save();
                ctx.beginPath();
                ctx.rect(0, dy0, dstW, stripH + 1);
                ctx.clip();
                ctx.setTransform(a, b, c, d, e, f);
                ctx.drawImage(srcCanvas, 0, 0);
                ctx.restore();
            }
            return dst;
        }

        // Scan: actual displayed image rect inside object-fit:contain container
        function getDisplayRect(img) {
            const cW = img.clientWidth, cH = img.clientHeight;
            const iW = img.naturalWidth, iH = img.naturalHeight;
            if (!iW || !iH) return { x: 0, y: 0, w: cW, h: cH, scale: 1 };
            const scale = Math.min(cW / iW, cH / iH);
            return { x: (cW - iW*scale)/2, y: (cH - iH*scale)/2, w: iW*scale, h: iH*scale, scale };
        }

        // Scan: draw quad + draggable handles on the overlay canvas
        function drawScanOverlay() {
            const overlay = document.getElementById('scanOverlay');
            const img    = document.getElementById('previewImage');
            overlay.width  = overlay.offsetWidth;
            overlay.height = overlay.offsetHeight;
            const ctx = overlay.getContext('2d');
            ctx.clearRect(0, 0, overlay.width, overlay.height);
            if (!state.scanCorners) return;

            const d  = getDisplayRect(img);
            const dc = state.scanCorners.map(c => ({ x: d.x + c.x*d.scale, y: d.y + c.y*d.scale }));

            ctx.beginPath();
            ctx.moveTo(dc[0].x, dc[0].y);
            ctx.lineTo(dc[1].x, dc[1].y);
            ctx.lineTo(dc[2].x, dc[2].y);
            ctx.lineTo(dc[3].x, dc[3].y);
            ctx.closePath();
            ctx.fillStyle   = 'rgba(37,99,235,0.15)';
            ctx.fill();
            ctx.strokeStyle = '#60a5fa';
            ctx.lineWidth   = 2;
            ctx.stroke();

            dc.forEach(c => {
                ctx.beginPath();
                ctx.arc(c.x, c.y, 18, 0, Math.PI * 2);
                ctx.fillStyle   = '#2563eb';
                ctx.fill();
                ctx.strokeStyle = '#fff';
                ctx.lineWidth   = 2;
                ctx.stroke();
            });
        }

        // Scan: wire up touch/mouse drag for corner handles (called once on init)
        function setupScanOverlayDrag() {
            const overlay = document.getElementById('scanOverlay');
            const img    = document.getElementById('previewImage');
            let dragging = null;

            function getPos(e) {
                const r = overlay.getBoundingClientRect();
                const src = e.touches ? e.touches[0] : e;
                return { x: src.clientX - r.left, y: src.clientY - r.top };
            }

            function onStart(e) {
                if (!state.scanCorners) return;
                const pos = getPos(e);
                const d = getDisplayRect(img);
                let best = 44, idx = null;
                state.scanCorners.forEach((c, i) => {
                    const dist = Math.hypot(pos.x - (d.x + c.x*d.scale), pos.y - (d.y + c.y*d.scale));
                    if (dist < best) { best = dist; idx = i; }
                });
                if (idx !== null) { dragging = idx; e.preventDefault(); e.stopPropagation(); }
            }

            function onMove(e) {
                if (dragging === null) return;
                e.preventDefault();
                const pos = getPos(e);
                const d = getDisplayRect(img);
                state.scanCorners[dragging] = {
                    x: Math.max(0, Math.min(img.naturalWidth,  (pos.x - d.x) / d.scale)),
                    y: Math.max(0, Math.min(img.naturalHeight, (pos.y - d.y) / d.scale))
                };
                drawScanOverlay();
            }

            function onEnd() { dragging = null; }

            overlay.addEventListener('mousedown',  onStart);
            overlay.addEventListener('mousemove',  onMove);
            overlay.addEventListener('mouseup',    onEnd);
            overlay.addEventListener('touchstart', onStart, { passive: false });
            overlay.addEventListener('touchmove',  onMove,  { passive: false });
            overlay.addEventListener('touchend',   onEnd);
        }

        // Preview
        function showPreview(dataUrl) {
            const img = document.getElementById('previewImage');
            img.src = dataUrl;
            state.scanMode = false;
            state.scanCorners = null;
            document.getElementById('scanOverlay').style.display = 'none';
            document.getElementById('scanModeBtn').classList.remove('active');
            showScreen('previewScreen');
        }

        document.getElementById('retakeBtn').addEventListener('click', () => {
            state.capturedPhotos.pop();
            state.scanMode = false;
            state.scanCorners = null;
            state.capturedDataUrl = null;
            document.getElementById('scanOverlay').style.display = 'none';
            document.getElementById('scanModeBtn').classList.remove('active');
            showScreen('cameraScreen');
        });

        document.getElementById('uploadBtn').addEventListener('click', uploadPhotos);

        // Upload
        async function uploadPhotos() {
            showScreen('uploadScreen');
            document.getElementById('uploadContent').innerHTML = `
                <div class="status-icon">⏳</div>
                <div class="status-text">Uploading Photos</div>
                <div class="status-subtext" id="uploadSubtext">Preparing upload...</div>
                <div class="upload-progress" id="uploadProgress"></div>
            `;
            document.getElementById('uploadSubtext').textContent = `Uploading ${state.capturedPhotos.length} photo(s)...`;

            // Apply perspective warp to the last captured photo if scan mode is active.
            // Source from the original blob (not the data URL) to avoid double JPEG compression.
            if (state.scanMode && state.scanCorners) {
                const sourceBlob = state.capturedPhotos[state.capturedPhotos.length - 1];
                await new Promise(resolve => {
                    const tmpImg = new Image();
                    const blobUrl = URL.createObjectURL(sourceBlob);
                    tmpImg.onload = () => {
                        URL.revokeObjectURL(blobUrl);
                        const src = document.createElement('canvas');
                        src.width = tmpImg.naturalWidth; src.height = tmpImg.naturalHeight;
                        src.getContext('2d').drawImage(tmpImg, 0, 0);
                        applyPerspectiveWarp(src, state.scanCorners).toBlob(blob => {
                            state.capturedPhotos[state.capturedPhotos.length - 1] = blob;
                            resolve();
                        }, 'image/jpeg', 0.95);
                    };
                    tmpImg.src = blobUrl;
                });
            }

            const progressContainer = document.getElementById('uploadProgress');
            progressContainer.innerHTML = '';

            let successCount = 0;
            let failureCount = 0;

            for (let i = 0; i < state.capturedPhotos.length; i++) {
                const blob = state.capturedPhotos[i];
                const progressId = `progress-${i}`;

                const progressEl = document.createElement('div');
                progressEl.className = 'progress-item';
                progressEl.innerHTML = `
                    <div class="progress-item-name">Photo ${i + 1} of ${state.capturedPhotos.length}</div>
                    <div class="progress-bar">
                        <div class="progress-fill" id="${progressId}"></div>
                    </div>
                `;
                progressContainer.appendChild(progressEl);

                try {
                    const albumSlug = state.selectedAlbumName.replace(/[^a-zA-Z0-9]/g, '_').toLowerCase();
                    const filename = `${albumSlug}_${Date.now()}_${i}.jpg`;
                    const now = new Date().toISOString();
                    const formData = new FormData();
                    formData.append('assetData', blob, filename);
                    formData.append('deviceAssetId', filename);
                    formData.append('deviceId', 'immich-artwork-camera');
                    formData.append('fileCreatedAt', now);
                    formData.append('fileModifiedAt', now);

                    const uploadRes = await fetch(
                        `/proxy-upload?url=${encodeURIComponent(state.immichUrl)}&apiKey=${encodeURIComponent(state.apiKey)}`,
                        { method: 'POST', body: formData }
                    );
                    const uploadResult = await uploadRes.json();
                    if (uploadResult.error) throw new Error(uploadResult.error);
                    if (uploadResult.status >= 400) throw new Error(`Upload failed: HTTP ${uploadResult.status}`);
                    const asset = JSON.parse(uploadResult.body);

                    const albumRes = await fetch('/proxy-add-to-album', {
                        method: 'PUT',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            url: state.immichUrl,
                            apiKey: state.apiKey,
                            albumId: state.selectedAlbumId,
                            assetIds: [asset.id]
                        })
                    });
                    const albumResult = await albumRes.json();
                    if (albumResult.error) throw new Error(albumResult.error);
                    if (albumResult.status >= 400) throw new Error(`Album add failed: HTTP ${albumResult.status}`);

                    document.getElementById(progressId).style.width = '100%';
                    successCount++;
                } catch (e) {
                    console.error('Upload error:', e.message);
                    failureCount++;
                    document.getElementById(progressId).style.backgroundColor = '#ef4444';
                }
            }

            // Show completion
            setTimeout(() => {
                const uploadContent = document.getElementById('uploadContent');
                if (failureCount === 0) {
                    uploadContent.innerHTML = `
                        <div class="status-icon">✓</div>
                        <div class="status-text">Upload Complete</div>
                        <div class="status-subtext">${successCount} photo(s) saved</div>
                    `;
                } else {
                    uploadContent.innerHTML = `
                        <div class="status-icon">⚠️</div>
                        <div class="status-text">Partial Upload</div>
                        <div class="status-subtext">${successCount} succeeded, ${failureCount} failed</div>
                    `;
                }

                const doneBtn = document.createElement('button');
                doneBtn.className = 'button button-primary mt-auto';
                doneBtn.style.marginTop = '20px';
                doneBtn.textContent = 'Capture More';
                doneBtn.addEventListener('click', () => {
                    state.capturedPhotos = [];
                    startCamera();
                });
                uploadContent.appendChild(doneBtn);
            }, 1500);
        }

        // Initialize: Check if settings exist and load last album
        window.addEventListener('load', () => {
            setupScanOverlayDrag();
            if (state.immichUrl && state.apiKey) {
                document.getElementById('startBtn').disabled = false;
                const lastAlbum = localStorage.getItem('lastAlbum');
                if (lastAlbum) {
                    const album = JSON.parse(lastAlbum);
                    state.selectedAlbumId = album.id;
                    state.selectedAlbumName = album.name;
                }
                loadAlbums();
            }
        });

        // Register service worker for offline app shell
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('/sw.js');
        }

        // iOS-specific: Prevent double-tap zoom on non-interactive elements only
        document.addEventListener('touchstart', (e) => {
            const tag = e.target.tagName;
            if (tag !== 'INPUT' && tag !== 'TEXTAREA' && tag !== 'BUTTON' && !e.target.closest('button, .album-item, .section-header')) {
                e.preventDefault();
            }
        }, { passive: false });
    </script>
</body>
</html>
